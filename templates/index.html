<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Career Mentor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <div class="container mt-5 mb-5">
    <h1 class="text-center mb-3">AI Career Mentor for Students</h1>
    <p class="text-center text-muted mb-4">Get a personalized skill roadmap in minutes</p>

    <!-- STEP 1: Role + Choice -->
    <div id="step1" class="card p-4 shadow-sm mx-auto" style="max-width: 500px;">

      <label for="targetRole" class="form-label">Choose your target role</label>
      <select id="targetRole" class="form-select mb-4">
        <option value="">-- Select a role --</option>
        <option value="Frontend Developer">Frontend Developer</option>
        <option value="Backend Developer">Backend Developer</option>
        <option value="Data Analyst">Data Analyst</option>
        <option value="Machine Learning Engineer">Machine Learning Engineer</option>
        <option value="Full Stack Developer">Full Stack Developer</option>
        <option value="AI/ML Research Intern">AI/ML Research Intern</option>
      </select>

      <p class="mb-2">Do you have a resume ready?</p>
      <button class="btn btn-outline-primary mb-2 w-100" onclick="showResumeUpload()">Yes, I have a resume</button>
      <button class="btn btn-outline-secondary w-100" onclick="showManualForm()">No, I don't have one yet</button>

    </div>

    <!-- STEP 2A: Resume Upload (hidden at first) -->
    <div id="resumeUpload" class="card p-4 shadow-sm mx-auto mt-3 d-none" style="max-width: 500px;">
      <label for="resumeFile" class="form-label">Upload your resume (PDF only)</label>
      <input type="file" id="resumeFile" class="form-control mb-3" accept=".pdf">
      <button class="btn btn-primary w-100" onclick="submitResumeForm()">Get My Roadmap</button>
    </div>

    <!-- STEP 2B: Manual Form (hidden at first) -->
    <div id="manualForm" class="card p-4 shadow-sm mx-auto mt-3 d-none" style="max-width: 500px;">
      <label class="form-label">Your Name</label>
      <input type="text" id="studentName" class="form-control mb-3">

      <label class="form-label">Education (degree, year, college)</label>
      <input type="text" id="studentEducation" class="form-control mb-3"
        placeholder="e.g. B.Tech AI&DS, 1st Year, XYZ College">

      <label class="form-label">Skills you know</label>
      <input type="text" id="studentSkills" class="form-control mb-3" placeholder="e.g. HTML, CSS, Python basics">

      <label class="form-label">Projects done (if any)</label>
      <input type="text" id="studentProjects" class="form-control mb-3" placeholder="e.g. My Projects portfolio site">

      <button class="btn btn-primary w-100" onclick="submitManualForm()">Get My Roadmap</button>
    </div>

    <!-- Loading spinner -->
    <div id="loadingBox" class="text-center mt-4 d-none">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2">Analyzing your profile... this can take a few seconds</p>
    </div>

    <!-- STEP 3: Result section (hidden at first) -->
    <div id="resultSection" class="mt-4 d-none" style="max-width: 700px; margin-left:auto; margin-right:auto;">

      <div id="resumeRatingCard" class="card p-4 shadow-sm mb-3 d-none">
        <h4 class="mb-3">⭐ Resume Rating</h4>
        <h2 id="resumeScore" class="text-primary"></h2>
        <p id="resumeFeedback" class="mb-0"></p>
      </div>

      <div class="card p-4 shadow-sm mb-3">
        <h4 class="mb-3">🎯 Skill Gap</h4>
        <ul id="skillGapList" class="mb-0"></ul>
      </div>

      <div class="card p-4 shadow-sm mb-3">
        <h4 class="mb-3">🗺️ Roadmap</h4>
        <ol id="roadmapList" class="mb-0"></ol>
      </div>

      <div class="card p-4 shadow-sm mb-3">
        <h4 class="mb-3">📅 Weekly Study Plan</h4>
        <div id="studyPlanBox"></div>
      </div>

      <div class="card p-4 shadow-sm mb-3">
        <h4 class="mb-3">💬 Interview Questions</h4>
        <ol id="interviewList" class="mb-0"></ol>
      </div>

    </div>

    <!-- Error box (hidden at first) -->
    <div id="errorBox" class="alert alert-danger mt-3 d-none mx-auto" style="max-width: 500px;"></div>

  </div>

  <script>
    function showResumeUpload() {
      document.getElementById('resumeUpload').classList.remove('d-none');
      document.getElementById('manualForm').classList.add('d-none');
    }

    function showManualForm() {
      document.getElementById('manualForm').classList.remove('d-none');
      document.getElementById('resumeUpload').classList.add('d-none');
    }

    function showLoading() {
      document.getElementById('loadingBox').classList.remove('d-none');
      document.getElementById('resultSection').classList.add('d-none');
      document.getElementById('errorBox').classList.add('d-none');
    }

    function hideLoading() {
      document.getElementById('loadingBox').classList.add('d-none');
    }

    function showError(message) {
      hideLoading();
      const box = document.getElementById('errorBox');
      box.classList.remove('d-none');
      box.textContent = message;
    }

    function renderResult(result) {
      hideLoading();

      if (result.error_message || result.error) {
        showError("Something went wrong: " + (result.error_message || result.error));
        return;
      }

      // Resume rating (only shows if present)
      if (result.resume_rating) {
        document.getElementById('resumeRatingCard').classList.remove('d-none');
        document.getElementById('resumeScore').textContent = result.resume_rating.score + " / 10";
        document.getElementById('resumeFeedback').textContent = result.resume_rating.feedback;
      } else {
        document.getElementById('resumeRatingCard').classList.add('d-none');
      }

      // Skill gap
      const skillGapList = document.getElementById('skillGapList');
      skillGapList.innerHTML = '';
      (result.skill_gap || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        skillGapList.appendChild(li);
      });

      // Roadmap
      const roadmapList = document.getElementById('roadmapList');
      roadmapList.innerHTML = '';
      (result.roadmap || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        li.className = 'mb-2';
        roadmapList.appendChild(li);
      });

      // Study plan
      const studyPlanBox = document.getElementById('studyPlanBox');
      studyPlanBox.innerHTML = '';
      const plan = result.study_plan || {};
      Object.keys(plan).forEach(week => {
        const p = document.createElement('p');
        p.innerHTML = `<strong>${week}:</strong> ${plan[week]}`;
        studyPlanBox.appendChild(p);
      });

      // Interview questions
      const interviewList = document.getElementById('interviewList');
      interviewList.innerHTML = '';
      (result.interview_questions || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        li.className = 'mb-2';
        interviewList.appendChild(li);
      });

      document.getElementById('resultSection').classList.remove('d-none');
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
    }

    function submitManualForm() {
      const role = document.getElementById('targetRole').value;
      if (!role) {
        alert("Please select a target role first.");
        return;
      }

      const data = {
        role: role,
        name: document.getElementById('studentName').value,
        education: document.getElementById('studentEducation').value,
        skills: document.getElementById('studentSkills').value,
        projects: document.getElementById('studentProjects').value
      };

      showLoading();

      fetch('/generate-roadmap', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
        .then(response => response.json())
        .then(result => renderResult(result))
        .catch(error => showError("Network error: " + error));
    }

    function submitResumeForm() {
      const role = document.getElementById('targetRole').value;
      const fileInput = document.getElementById('resumeFile');

      if (!role) {
        alert("Please select a target role first.");
        return;
      }
      if (!fileInput.files.length) {
        alert("Please choose a PDF resume to upload.");
        return;
      }

      const formData = new FormData();
      formData.append('resume', fileInput.files[0]);
      formData.append('role', role);

      showLoading();

      fetch('/generate-roadmap-resume', {
        method: 'POST',
        body: formData
      })
        .then(response => response.json())
        .then(result => renderResult(result))
        .catch(error => showError("Network error: " + error));
    }
  </script>

</body>

</html>
